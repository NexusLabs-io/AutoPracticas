<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    canvas { border: 1px solid #ccc; margin: 10px; }
    .download { margin: 10px; }
  </style>
</head>
<body>
  <h1>Icon Generator for AutoPrácticas Extension</h1>
  <p>Right-click on each canvas and save as PNG with the corresponding filename.</p>

  <div>
    <h3>icon16.png</h3>
    <canvas id="c16" width="16" height="16"></canvas>
  </div>
  <div>
    <h3>icon48.png</h3>
    <canvas id="c48" width="48" height="48"></canvas>
  </div>
  <div>
    <h3>icon128.png</h3>
    <canvas id="c128" width="128" height="128"></canvas>
  </div>

  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      const scale = size / 16;

      // Background gradient
      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, '#6366f1');
      grad.addColorStop(1, '#8b5cf6');

      // Rounded rect
      const radius = 3 * scale;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Lightning bolt
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.moveTo(8.5 * scale, 3 * scale);
      ctx.lineTo(4 * scale, 9 * scale);
      ctx.lineTo(7.5 * scale, 9 * scale);
      ctx.lineTo(7 * scale, 13 * scale);
      ctx.lineTo(12 * scale, 7 * scale);
      ctx.lineTo(8.5 * scale, 7 * scale);
      ctx.lineTo(8.5 * scale, 3 * scale);
      ctx.closePath();
      ctx.fill();
    }

    drawIcon(document.getElementById('c16'));
    drawIcon(document.getElementById('c48'));
    drawIcon(document.getElementById('c128'));
  </script>
</body>
</html>
